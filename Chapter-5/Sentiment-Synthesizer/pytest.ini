[pytest]
# Pytest configuration for Sentiment Synthesizer

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 6.0

# Add options that will always be used
addopts = 
    -ra
    --strict-markers
    --strict-config
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    --tb=short

# Markers for test organization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, dependencies)
    slow: Slow running tests
    gpu: Tests requiring GPU
    requires_api: Tests requiring external APIs

# Test paths
testpaths = tests

# Ignore certain directories
norecursedirs = 
    .git
    .venv
    venv
    build
    dist
    *.egg-info
    __pycache__

# Logging configuration
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(filename)s:%(lineno)d %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Output options
console_output_style = progress

# Timeout for tests (30 seconds default)
timeout = 30

# Coverage settings
[coverage:run]
source = src
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
