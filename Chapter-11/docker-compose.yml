# Local stack for the Dynamic Document Reader: Ollama (model server) + the API.
#
# Quick start:
#   docker compose up -d ollama
#   docker compose exec ollama ollama pull llama3.1:8b
#   docker compose exec ollama ollama pull nomic-embed-text
#   docker compose exec ollama ollama pull llama3.1:70b   # large; needs a capable host
#   docker compose up app
#
# The app talks to Ollama over the compose network at http://ollama:11434.
services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # Uncomment to expose host GPUs (NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  app:
    build: .
    depends_on:
      - ollama
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      FAISS_PERSIST_DIR: /app/data/faiss_index
      UPLOAD_DIR: /app/data/uploads
    ports:
      - "8090:8090"
    volumes:
      - ./data:/app/data
    command: uvicorn src.api:app --host 0.0.0.0 --port 8090

volumes:
  ollama_models:
