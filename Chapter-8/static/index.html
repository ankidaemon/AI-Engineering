<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Content Curator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface2: #22222e;
      --border: #2e2e3e;
      --accent: #7c6af7;
      --accent2: #a78bfa;
      --text: #e2e2ef;
      --muted: #8888aa;
      --green: #34d399;
      --red: #f87171;
      --tag-bg: #2a2040;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.3px; }
    header h1 span { color: var(--accent2); }
    #stats-bar { font-size: 0.78rem; color: var(--muted); }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 0;
      min-height: calc(100vh - 57px);
    }

    /* ── Sidebar ── */
    aside {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    aside h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }

    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.35rem; }

    input[type="text"], select, input[type="number"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.55rem 0.75rem;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus, select:focus { border-color: var(--accent); }

    /* Tag chips input */
    .chips-wrap {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.4rem 0.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      cursor: text;
      min-height: 44px;
      transition: border-color 0.2s;
    }
    .chips-wrap:focus-within { border-color: var(--accent); }
    .chip {
      background: var(--tag-bg);
      color: var(--accent2);
      border-radius: 5px;
      padding: 0.2rem 0.55rem;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .chip button {
      background: none; border: none; color: var(--muted);
      cursor: pointer; padding: 0; line-height: 1; font-size: 0.9rem;
    }
    .chip button:hover { color: var(--red); }
    #interest-input {
      background: none; border: none; color: var(--text);
      font-size: 0.85rem; outline: none; min-width: 80px; flex: 1;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 0.65rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { opacity: 0.9; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover:not(:disabled) { border-color: var(--accent); }

    .btn-group { display: flex; flex-direction: column; gap: 0.6rem; }

    /* Status */
    #status {
      font-size: 0.82rem;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      min-height: 2.5rem;
      line-height: 1.5;
    }
    #status.ok { color: var(--green); border-color: #1a4a3a; background: #0e2a22; }
    #status.err { color: var(--red); border-color: #4a1a1a; background: #2a0e0e; }
    #status.loading { color: var(--accent2); border-color: #3a2a5a; background: #1a1130; }

    /* ── Main Feed ── */
    main {
      padding: 2rem;
      overflow-y: auto;
    }

    #intro-msg {
      font-size: 1rem;
      color: var(--accent2);
      margin-bottom: 1.5rem;
      padding: 0.75rem 1rem;
      background: #1e1640;
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      display: none;
    }

    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      height: 60vh;
      color: var(--muted);
      text-align: center;
    }
    #empty-state .icon { font-size: 3rem; opacity: 0.4; }
    #empty-state p { font-size: 0.9rem; max-width: 280px; line-height: 1.6; }

    /* Article grid */
    #feed {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.25rem;
    }

    .article-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: border-color 0.2s, transform 0.15s;
      animation: fadeIn 0.3s ease;
    }
    .article-card:hover { border-color: var(--accent); transform: translateY(-2px); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .source-tag {
      font-size: 0.72rem;
      background: var(--tag-bg);
      color: var(--accent2);
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }
    .relevance {
      font-size: 0.72rem;
      color: var(--green);
      white-space: nowrap;
    }

    .card-title a {
      color: var(--text);
      text-decoration: none;
      font-size: 0.97rem;
      font-weight: 600;
      line-height: 1.4;
    }
    .card-title a:hover { color: var(--accent2); }

    .card-summary {
      font-size: 0.84rem;
      color: var(--muted);
      line-height: 1.65;
    }
    .ai-summary {
      font-size: 0.86rem;
      color: var(--text);
      line-height: 1.65;
      padding: 0.75rem;
      background: #1a1030;
      border-left: 2px solid var(--accent);
      border-radius: 0 6px 6px 0;
    }
    .ai-label {
      font-size: 0.7rem;
      color: var(--accent2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.35rem;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
    }
    .card-date { font-size: 0.75rem; color: var(--muted); }
    .card-actions { display: flex; gap: 0.4rem; }

    .like-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.25rem 0.55rem;
      cursor: pointer;
      font-size: 0.8rem;
      color: var(--muted);
      transition: all 0.15s;
    }
    .like-btn:hover { background: var(--surface2); }
    .like-btn.liked { color: var(--green); border-color: var(--green); background: #0e2a1a; }
    .like-btn.disliked { color: var(--red); border-color: var(--red); background: #2a0e0e; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      aside { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<header>
  <h1>AI <span>Content Curator</span></h1>
  <span id="stats-bar">Ready</span>
</header>

<div class="layout">
  <!-- Sidebar -->
  <aside>
    <div>
      <h2>Your Profile</h2>
    </div>

    <div>
      <label for="name-input">Your name</label>
      <input type="text" id="name-input" placeholder="e.g. Alex" />
    </div>

    <div>
      <label>Interests <small style="color:var(--muted)">(press Enter to add)</small></label>
      <div class="chips-wrap" id="chips-wrap" onclick="document.getElementById('interest-input').focus()">
        <input type="text" id="interest-input" placeholder="e.g. AI, climate..." />
      </div>
    </div>

    <div>
      <label for="level-select">Reading level</label>
      <select id="level-select">
        <option value="beginner">Beginner</option>
        <option value="intermediate" selected>Intermediate</option>
        <option value="expert">Expert</option>
      </select>
    </div>

    <div>
      <label for="tone-select">Tone</label>
      <select id="tone-select">
        <option value="casual" selected>Casual</option>
        <option value="formal">Formal</option>
        <option value="analytical">Analytical</option>
      </select>
    </div>

    <div>
      <label for="max-articles">Max articles</label>
      <input type="number" id="max-articles" value="6" min="1" max="20" />
    </div>

    <div class="btn-group">
      <button class="btn btn-secondary" onclick="fetchArticles()">
        Fetch &amp; Index Articles
      </button>
      <button class="btn btn-primary" onclick="getFeed()">
        Generate My Feed
      </button>
    </div>

    <div id="status">Set your preferences and click "Generate My Feed".</div>
  </aside>

  <!-- Main -->
  <main>
    <div id="intro-msg"></div>
    <div id="empty-state">
      <div class="icon">✦</div>
      <p>Set your interests in the sidebar and click <strong>Generate My Feed</strong> to get personalized articles.</p>
    </div>
    <div id="feed"></div>
  </main>
</div>

<script>
  const API = "";
  const USER_ID = "user_" + Math.random().toString(36).slice(2, 9);
  let interests = [];

  // ── Chip input ──────────────────────────────────────────────
  document.getElementById("interest-input").addEventListener("keydown", e => {
    if (e.key === "Enter" || e.key === ",") {
      e.preventDefault();
      const val = e.target.value.trim().replace(/,$/, "");
      if (val && !interests.includes(val)) {
        interests.push(val);
        renderChips();
      }
      e.target.value = "";
    } else if (e.key === "Backspace" && e.target.value === "" && interests.length) {
      interests.pop();
      renderChips();
    }
  });

  function renderChips() {
    const wrap = document.getElementById("chips-wrap");
    const input = document.getElementById("interest-input");
    wrap.querySelectorAll(".chip").forEach(c => c.remove());
    interests.forEach((tag, i) => {
      const chip = document.createElement("div");
      chip.className = "chip";
      chip.innerHTML = `${tag}<button onclick="removeChip(${i})">×</button>`;
      wrap.insertBefore(chip, input);
    });
  }

  function removeChip(i) {
    interests.splice(i, 1);
    renderChips();
  }

  // ── Helpers ──────────────────────────────────────────────────
  function setStatus(msg, type = "") {
    const el = document.getElementById("status");
    el.className = type;
    el.innerHTML = msg;
  }

  function getPrefs() {
    return {
      user_id: USER_ID,
      name: document.getElementById("name-input").value.trim() || "Reader",
      interests: interests.length ? interests : ["technology", "ai"],
      reading_level: document.getElementById("level-select").value,
      tone: document.getElementById("tone-select").value,
      max_articles: parseInt(document.getElementById("max-articles").value) || 6,
    };
  }

  async function savePrefs() {
    const prefs = getPrefs();
    await fetch(`${API}/preferences`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(prefs),
    });
    return prefs;
  }

  async function updateStats() {
    try {
      const r = await fetch(`${API}/stats`);
      const d = await r.json();
      document.getElementById("stats-bar").textContent =
        `${d.articles_in_store} articles indexed`;
    } catch {}
  }

  // ── Fetch & index ─────────────────────────────────────────────
  async function fetchArticles() {
    const prefs = getPrefs();
    setStatus(`<span class="spinner"></span>Fetching articles from RSS feeds…`, "loading");
    try {
      const r = await fetch(`${API}/fetch`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ topics: prefs.interests }),
      });
      const d = await r.json();
      setStatus(`Indexed ${d.indexed} articles. Total in store: ${d.total_in_store}.`, "ok");
      updateStats();
    } catch (err) {
      setStatus("Failed to fetch articles. Check the server.", "err");
    }
  }

  // ── Get personalized feed ─────────────────────────────────────
  async function getFeed() {
    await savePrefs();
    setStatus(`<span class="spinner"></span>Curating your feed with AI…`, "loading");
    document.getElementById("feed").innerHTML = "";
    document.getElementById("empty-state").style.display = "none";
    document.getElementById("intro-msg").style.display = "none";

    try {
      const r = await fetch(`${API}/feed/${USER_ID}`);
      if (!r.ok) {
        const err = await r.json();
        throw new Error(err.detail || "Unknown error");
      }
      const data = await r.json();
      renderFeed(data);
      setStatus(`Feed ready — ${data.articles.length} articles curated.`, "ok");
      updateStats();
    } catch (err) {
      setStatus(`Error: ${err.message}`, "err");
      document.getElementById("empty-state").style.display = "flex";
    }
  }

  function renderFeed(data) {
    const intro = document.getElementById("intro-msg");
    intro.textContent = data.intro;
    intro.style.display = "block";

    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    data.articles.forEach((a, i) => {
      const card = document.createElement("div");
      card.className = "article-card";
      card.style.animationDelay = `${i * 0.05}s`;

      const published = formatDate(a.published);
      const score = a.relevance_score !== undefined
        ? `<span class="relevance">★ ${(a.relevance_score * 100).toFixed(0)}% match</span>`
        : "";

      card.innerHTML = `
        <div class="card-meta">
          <span class="source-tag">${escHtml(a.source)}</span>
          ${score}
        </div>
        <div class="card-title">
          <a href="${escHtml(a.url)}" target="_blank" rel="noopener">${escHtml(a.title)}</a>
        </div>
        ${a.personalized_summary ? `
          <div>
            <div class="ai-label">✦ AI Summary</div>
            <div class="ai-summary">${escHtml(a.personalized_summary)}</div>
          </div>` : `<p class="card-summary">${escHtml(a.summary?.slice(0, 200) || "")}…</p>`
        }
        <div class="card-footer">
          <span class="card-date">${published}</span>
          <div class="card-actions">
            <button class="like-btn" id="like-${i}" onclick="sendFeedback('${escHtml(a.id)}', ${i}, true)">👍</button>
            <button class="like-btn" id="dislike-${i}" onclick="sendFeedback('${escHtml(a.id)}', ${i}, false)">👎</button>
          </div>
        </div>
      `;

      feed.appendChild(card);
    });
  }

  async function sendFeedback(articleId, idx, liked) {
    const lb = document.getElementById(`like-${idx}`);
    const db = document.getElementById(`dislike-${idx}`);
    lb.classList.toggle("liked", liked);
    db.classList.toggle("disliked", !liked);

    try {
      await fetch(`${API}/feedback`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: USER_ID, article_id: articleId, liked }),
      });
    } catch {}
  }

  function formatDate(str) {
    if (!str) return "";
    try {
      return new Date(str).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    } catch { return str; }
  }

  function escHtml(s) {
    if (!s) return "";
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // Init
  updateStats();
</script>
</body>
</html>
